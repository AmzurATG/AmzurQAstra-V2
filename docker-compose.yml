version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: qastra-db
    environment:
      POSTGRES_USER: ${DB_USER:-qastra}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-qastra123}
      POSTGRES_DB: ${DB_NAME:-qastra}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-qastra}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching/sessions
  redis:
    image: redis:7-alpine
    container_name: qastra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qastra-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-qastra}:${DB_PASSWORD:-qastra123}@db:5432/${DB_NAME:-qastra}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MCP_SERVER_URL=http://mcp-server:3001
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qastra-frontend
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # MCP Server (Playwright)
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: qastra-mcp
    environment:
      - PORT=3001
      - LOG_LEVEL=info
    ports:
      - "3001:3001"
    # Required for Playwright browsers
    shm_size: '2gb'
    volumes:
      - ./mcp-server:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  uploads_data:
